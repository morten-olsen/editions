name: Deploy Website

on:
  push:
    branches: [main]
    paths:
      - "apps/website/**"
      - "apps/web/.storybook/**"
      - "apps/web/src/**/*.stories.*"
      - "apps/web/src/**/*.mdx"
      - ".github/workflows/website.yml"
  workflow_dispatch:

concurrency:
  group: website-deploy
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build website
        run: pnpm --filter @editions/website build
        env:
          ASTRO_SITE: ${{ steps.pages.outputs.origin }}
          ASTRO_BASE: ${{ steps.pages.outputs.base_path }}

      - name: Build Storybook
        run: pnpm --filter @editions/web build-storybook

      - name: Copy Storybook into website
        run: cp -r apps/web/storybook-static apps/website/dist/design-system

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/website/dist

  deploy:
    needs: build
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
