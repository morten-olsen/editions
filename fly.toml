# See https://fly.io/docs/reference/configuration/ for reference.
#
# Initial setup:
#   fly apps create editions
#   fly volumes create editions_data --region <region> --size 1
#   fly secrets set EDITIONS_JWT_SECRET=$(openssl rand -hex 32)
#   fly deploy

app = "editions"
primary_region = "ams"

[build]
  image = "ghcr.io/morten-olsen/editions:latest"

[env]
  EDITIONS_DB = "/data/editions.db"
  EDITIONS_HOST = "0.0.0.0"
  EDITIONS_PORT = "3007"
  HF_HOME = "/data/models"

[http_service]
  internal_port = 3007
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"

[mounts]
  source = "editions_data"
  destination = "/data"
